project:
  name: "diamonds_regression"
  seed: 21096709
  run_id_mode: "timestamp"
  run_id: "run_local"

data:
  input_csv: "data/raw/diamonds.csv"
  target: "price"
  num_cols: ["carat", "depth", "table", "x", "y", "z"]
  cat_cols: ["cut", "color", "clarity"]
  test_size: 0.2

model:
  task: "regression"
  name: "rf"
  params:
    n_estimators: 100
    max_depth: 10
    seed: 109921544

output:
  artifacts_dir: "artifacts"
  logs_dir: "logs"
  save_predictions: true
  save_model: true
  save_report: true
